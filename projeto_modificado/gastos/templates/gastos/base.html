<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gerenciador de Tarefas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; }
        .navbar-brand { font-weight: 700; }
        .card { box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .badge-prioridade { font-size: .75rem; }
        .prioridade-urgente { background-color: #dc3545 !important; }
        .prioridade-pode_esperar { background-color: #ffc107 !important; color: #212529 !important; }
        .prioridade-sem_urgencia { background-color: #198754 !important; }
        .tarefa-concluida td { text-decoration: line-through; opacity: 0.6; }
        .btn-prioridade { border: 2px solid #dee2e6; border-radius: 8px; padding: 8px 14px; cursor: pointer; transition: all .2s; }
        .btn-prioridade:hover { transform: scale(1.04); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'gastos:index' %}">✅ Gerenciador de Tarefas</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'gastos:adicionar' %}">+ Nova Tarefa</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>Gerenciador de Tarefas Pessoais 2.1.1</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
